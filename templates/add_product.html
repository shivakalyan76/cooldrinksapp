{% extends "base.html" %}
{% block title %}Add Product · CoolDrinks{% endblock %}
{% block page_title %}Add Product{% endblock %}

{% block content %}
<div class="form-page">
  <div class="form-card">
    <div class="form-card-header">
      <span class="form-card-icon">＋</span>
      <div>
        <h2>New Product</h2>
        <p>Add a new cool drink product to your inventory.</p>
      </div>
    </div>

    <form method="POST" action="{{ url_for('add_product') }}" class="form">
      <div class="form-group">
        <label for="name">Product Name</label>
        <input type="text" id="name" name="name" required
               placeholder="e.g. Coca-Cola 300ml Carton"
               value="{{ request.form.get('name', '') }}">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="price">Price Per Carton (₹)</label>
          <input type="number" id="price" name="price" required min="0.01" step="0.01"
                 placeholder="e.g. 800"
                 value="{{ request.form.get('price', '') }}">
        </div>
        <div class="form-group">
          <label for="stock">Initial Stock (Cartons)</label>
          <input type="number" id="stock" name="stock" required min="0" step="1"
                 placeholder="e.g. 50"
                 value="{{ request.form.get('stock', '') }}">
        </div>
      </div>

      <div class="form-actions">
        <a href="{{ url_for('products') }}" class="btn btn--ghost">Cancel</a>
        <button type="submit" class="btn btn--primary">Add Product →</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
